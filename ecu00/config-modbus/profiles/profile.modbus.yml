name: "Profile-Modbus-SMP4250"
manufacturer: "BEAVER"
description: "BEAVER Emulator Transformer Sensor"
labels:
  - "Modbus TCP"
  - "BEAVER"
deviceResources:
  -
    name: "Resource1"
    isHidden: false
    description: "Resource available in Modbus holding register 0"
    attributes:
      { primaryTable: "HOLDING_REGISTERS", startingAddress: 0, rawType: "Int16" }
    properties:
      valueType: "Float32"
      readWrite: "RW"
      scale: 1.0

deviceCommands:
  -
    name: "ReadAllRegisters"
    readWrite: "R"
    isHidden: false
    resourceOperations:
      - { deviceResource: "Resource1" }