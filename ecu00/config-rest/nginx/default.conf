server {
    listen 8080;
    server_name _;

    location / {
        # device-rest appends '?<nil>' when no query params are set; normalize it
        # if ($args = "<nil>") {
        #     set $args "";
        # }

        proxy_pass https://169.254.84.30:443;
        proxy_ssl_server_name on;
        proxy_ssl_verify off;

        proxy_http_version 1.1;
        proxy_set_header Authorization "Basic ${REST_PROXY_BASIC_AUTH}";
        proxy_set_header Host 169.254.84.30;
        proxy_set_header Connection "";
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # Normalize Content-Type response header to remove charset
        proxy_hide_header Content-Type;
        add_header Content-Type "application/json";
    }
}
